<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantom Prahy</title>
<style>
/* Self-contained font stack – no external requests needed for GitHub Pages */
</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0905;--sf:#16110a;--s2:#1e1710;
  --gold:#c9a84c;--gl:#e8c96a;--gd:#7a5f20;
  --text:#e4cfa0;--muted:#7a6a4a;--border:#2e2416;
  --r:#e74c3c;--g:#2ecc71;--y:#f1c40f;--b:#3498db;--w:#dddddd;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;min-height:100dvh}

header{padding:10px 16px 8px;display:flex;align-items:center;gap:10px;background:linear-gradient(180deg,rgba(201,168,76,.1),transparent);border-bottom:1px solid var(--gd);flex-shrink:0}
.hdr-titles{flex:1;text-align:center}
header h1{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.85rem;letter-spacing:.2em;color:var(--gold)}
header p{font-size:.65rem;color:var(--muted);margin-top:1px}
.edit-toggle{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;border-radius:5px;border:1px solid var(--gd);background:transparent;color:var(--gold);cursor:pointer;white-space:nowrap;flex-shrink:0}
.edit-toggle.active{background:var(--gd);color:#0c0905;font-weight:700}

/* EDIT MODE */
.edit-bar{display:none;align-items:center;gap:8px;padding:7px 10px;background:#1a0e00;border-bottom:1px solid #5a3e10;flex-shrink:0;flex-wrap:wrap}
.edit-bar.visible{display:flex}
.edit-info{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.68rem;color:var(--gold);flex:1}
.edit-sel-display{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.75rem;color:var(--gl);font-weight:700;min-width:80px}
.edit-save-btn{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:4px;border:1px solid #2ecc71;background:rgba(46,204,113,.15);color:#2ecc71;cursor:pointer}
.edit-undo-btn{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}

/* FIELD LIST for edit */
.field-picker{display:none;background:var(--sf);border-bottom:1px solid var(--border);padding:6px 8px;flex-shrink:0}
.field-picker.visible{display:block}
.field-picker-inner{display:flex;flex-wrap:wrap;gap:4px;max-height:90px;overflow-y:auto}
.fp-chip{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.65rem;font-weight:700;width:34px;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:rgba(201,168,76,.06);color:var(--muted);cursor:pointer;transition:all .12s}
.fp-chip:active{transform:scale(.9)}
.fp-chip.selected{border-color:var(--gold);background:rgba(201,168,76,.25);color:var(--gl)}
.fp-chip.moved{border-color:#2ecc71;color:#2ecc71;background:rgba(46,204,113,.1)}

/* PHANTOM SELECTOR */
.ph-row{display:flex;gap:10px;padding:8px 12px;background:var(--sf);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.ph-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 7px 5px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;transition:all .18s;flex-shrink:0;position:relative;user-select:none;margin:0 2px}
.ph-minus{position:absolute;top:-8px;left:-8px;width:20px;height:20px;border-radius:50%;background:#c0392b;border:2px solid #0c0905;color:#fff;font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900;z-index:5;transition:transform .15s}
.ph-minus:active{transform:scale(.85)}
.ph-btn:active{transform:scale(.91)}
.badge{position:absolute;top:-7px;right:-7px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.6rem;font-weight:900;opacity:0;transition:opacity .2s;border:1.5px solid rgba(0,0,0,.3)}
.ph-btn.selected .badge{opacity:1}
.ph-btn.sel-r{border-color:var(--r);background:rgba(231,76,60,.15)}
.ph-btn.sel-g{border-color:var(--g);background:rgba(46,204,113,.15)}
.ph-btn.sel-y{border-color:var(--y);background:rgba(241,196,15,.15)}
.ph-btn.sel-b{border-color:var(--b);background:rgba(52,152,219,.15)}
.ph-btn.sel-w{border-color:var(--w);background:rgba(221,221,221,.1)}
.ph-label{font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.56rem;letter-spacing:.07em;white-space:nowrap}




/* GEN BUTTON */
.gen-row{padding:7px 10px;flex-shrink:0}
.gen-btn{width:100%;padding:13px;background:linear-gradient(135deg,#c9a84c,#8a6820);border:none;border-radius:7px;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.85rem;letter-spacing:.16em;text-transform:uppercase;color:#0c0905;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,.25);transition:all .2s}
.gen-btn:active{transform:scale(.98)}
.gen-btn:disabled{opacity:.3;pointer-events:none}

/* MAP */
.map-wrap{flex:1;position:relative;overflow:hidden;background:#0a0806;touch-action:manipulation}
.map-img{width:100%;height:100%;object-fit:contain;display:block}
#mapCanvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}#mapCanvas.edit-active{pointer-events:auto;cursor:crosshair}

/* RESULTS OVERLAY */
.res-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(12,9,5,.97);border-top:1px solid var(--gd);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);max-height:50%;display:flex;flex-direction:column;z-index:10}
.res-overlay.open{transform:translateY(0)}
.res-handle{text-align:center;padding:7px;cursor:pointer;color:var(--muted);font-size:.7rem;letter-spacing:.1em;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;border-bottom:1px solid var(--border);flex-shrink:0;user-select:none}
.res-scroll{overflow-y:auto;padding:10px 12px 14px;flex:1}
.rgroup{margin-bottom:12px}
.rgroup-head{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.72rem;letter-spacing:.1em}
.nums-row{display:flex;flex-wrap:wrap;gap:6px}
.num-chip{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.8rem;font-weight:700;border:2px solid;cursor:pointer;transition:all .15s;user-select:none}
.chip-r{border-color:var(--r);color:var(--r);background:rgba(231,76,60,.1)}
.chip-g{border-color:var(--g);color:var(--g);background:rgba(46,204,113,.1)}
.chip-y{border-color:var(--y);color:var(--y);background:rgba(241,196,15,.1)}
.chip-b{border-color:var(--b);color:var(--b);background:rgba(52,152,219,.1)}
.chip-w{border-color:var(--w);color:var(--w);background:rgba(221,221,221,.08)}
.chip-r.hl{background:rgba(231,76,60,.5);box-shadow:0 0 14px rgba(231,76,60,.7);transform:scale(1.1)}
.chip-g.hl{background:rgba(46,204,113,.5);box-shadow:0 0 14px rgba(46,204,113,.7);transform:scale(1.1)}
.chip-y.hl{background:rgba(241,196,15,.5);box-shadow:0 0 14px rgba(241,196,15,.7);transform:scale(1.1)}
.chip-b.hl{background:rgba(52,152,219,.5);box-shadow:0 0 14px rgba(52,152,219,.7);transform:scale(1.1)}
.chip-w.hl{background:rgba(221,221,221,.4);box-shadow:0 0 14px rgba(221,221,221,.6);transform:scale(1.1)}

/* BOTTOM BTNS */
.btm-row{display:flex;gap:8px;padding:7px 10px;flex-shrink:0;border-top:1px solid var(--border)}
.btm-btn{flex:1;padding:10px;background:transparent;border:1px solid var(--gd);border-radius:6px;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.7rem;letter-spacing:.12em;color:var(--gold);cursor:pointer;text-transform:uppercase}
.rst-btn{padding:10px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;font-size:.7rem;letter-spacing:.12em;color:var(--muted);cursor:pointer;text-transform:uppercase}
.rst-btn:active{color:var(--gold)}

/* ── MOBILE RESPONSIVE ── */
@media (max-width:400px){
  .ph-btn{padding:4px 5px}
  .ph-label{font-size:.52rem}
  header h1{font-size:.78rem;letter-spacing:.12em}
  .gen-btn{font-size:.78rem;padding:12px}
  .num-chip{width:42px;height:42px}
  .edit-bar{flex-wrap:wrap}
}
/* Safe area for iPhone notch/home bar */
body{padding-bottom:env(safe-area-inset-bottom)}
.btm-row{padding-bottom:max(7px,env(safe-area-inset-bottom))}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gd)}
</style>
</head>

    +'</svg>';
}

// ═══ BUILD SELECTOR ═══
function buildSel(){
  const row=document.getElementById('phRow');
  [...row.querySelectorAll('.ph-btn')].forEach(b=>b.remove());
  const firstChild = row.firstChild;
  for(const [k,p] of Object.entries(PH)){
    const cnt=sel[k]||0;
    const btn=document.createElement('button');
    btn.className='ph-btn'+(cnt?' selected sel-'+k:'');
    btn.dataset.k=k;
    btn.onclick=()=>addPh(k);
    // minus button — built as element to avoid quote hell
    if(cnt>0){
      const minus=document.createElement('button');
      minus.className='ph-minus';
      minus.textContent='−';
      minus.title='Odebrat jednoho';
      minus.onclick=(e)=>{e.stopPropagation();decPh(k);};
      btn.appendChild(minus);
    }
    // count badge
    const badge=document.createElement('span');
    badge.className='badge';
    badge.style.background=p.hex;
    badge.style.color=(k==='w'?'#333':'#0c0905');
    badge.textContent=cnt;
    btn.appendChild(badge);
    // phantom SVG + label via innerHTML append
    const inner=document.createElement('span');
    inner.innerHTML=phSVG(p.hex,32,41)+'<span class="ph-label" style="color:'+(cnt?p.hex:'var(--muted)')+'">'+p.name+'</span>';
    btn.appendChild(inner);
    row.insertBefore(btn, firstChild);
  }
  document.getElementById('genBtn').disabled=!Object.values(sel).some(v=>v>0);
}
function addPh(k){
  const c=sel[k]||0;
  if(c<10) sel[k]=(c+1);
  buildSel();
}

function decPh(k){
  const c=sel[k]||0;
  if(c<=1) delete sel[k];
  else sel[k]=c-1;
  buildSel();
}


// ═══ GENERATE ═══
function pickRandom(n){
  const pool=[];
  for(let i=1;i<=202;i++) if(!usedNums.has(i)) pool.push(i);
  const take=Math.min(n,pool.length),res=[];
  while(res.length<take){const i=Math.floor(Math.random()*pool.length);res.push(pool.splice(i,1)[0]);}
  return res.sort((a,b)=>a-b);
}

function generate(){
  groups=[];usedNums.clear();activeHL=null;
  for(const [k,cnt] of Object.entries(sel)){
    if(!cnt) continue;
    for(let i=0;i<cnt;i++){
      const nums=pickRandom(cntPerPh);
      nums.forEach(n=>usedNums.add(n));
      groups.push({color:k,idx:i+1,numbers:nums});
    }
  }
  buildResults();
  drawMap();
  document.getElementById('btmRow').style.display='flex';
  document.getElementById('resOverlay').classList.add('open');
}

function resetGame(){
  groups=[];usedNums.clear();activeHL=null;
  drawMap();
  document.getElementById('resOverlay').classList.remove('open');
  document.getElementById('btmRow').style.display='none';
}

function toggleOverlay(){document.getElementById('resOverlay').classList.toggle('open');}

// ═══ RESULTS LIST ═══
function buildResults(){
  const el=document.getElementById('resScroll');
  el.innerHTML='';
  for(const grp of groups){
    const p=PH[grp.color];
    const multiSameColor=groups.filter(g=>g.color===grp.color).length>1;
    const lbl=multiSameColor?p.name+' #'+grp.idx:p.name+' fantom';
    const div=document.createElement('div');
    div.className='rgroup';
    div.innerHTML='<div class="rgroup-head">'+phSVG(p.hex,20,26)
      +'<span style="color:'+p.hex+'">'+lbl+'</span>'
      +'<span style="color:var(--muted);margin-left:auto;font-size:.7rem">'+grp.numbers.length+'×</span></div>'
      +'<div class="nums-row">'
      +grp.numbers.map(n=>'<div class="num-chip '+p.chip+'" data-n="'+n+'" onclick="chipClick(this,'+n+')">'+n+'</div>').join('')
      +'</div>';
    el.appendChild(div);
  }
}

function chipClick(chip,num){
  document.querySelectorAll('.num-chip.hl').forEach(c=>c.classList.remove('hl'));
  if(activeHL===num){activeHL=null;drawMap();return;}
  chip.classList.add('hl');
  activeHL=num;
  drawMap();
  document.getElementById('resOverlay').classList.remove('open');
}

// ═══ MAP DRAWING ═══
function getRect(img,wrap){
  const iw=img.naturalWidth||1400,ih=img.naturalHeight||1074;
  const ww=wrap.clientWidth,wh=wrap.clientHeight;
  const s=Math.min(ww/iw,wh/ih);
  return{x:(ww-iw*s)/2,y:(wh-ih*s)/2,w:iw*s,h:ih*s};
}

function drawMap(){
  const canvas=document.getElementById('mapCanvas');
  const wrap=document.getElementById('mapWrap');
  canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!groups.length) return;
  const rect=getRect(mapImg,wrap);

  // Draw all markers
  for(const grp of groups){
    const p=PH[grp.color];
    for(const n of grp.numbers){
      const c=COORDS[n];if(!c)continue;
      const px=rect.x+(c[0]/100)*rect.w;
      const py=rect.y+(c[1]/100)*rect.h;
      const isHL=(n===activeHL);
      drawMarker(ctx,px,py,p.hex,n,isHL,grp.color==='w');
    }
  }
}

function drawMarker(ctx,x,y,color,num,hl,isWhite){
  const r=hl?20:14;
  if(hl){
    // outer glow ring
    ctx.save();
    ctx.beginPath();ctx.arc(x,y,r+7,0,Math.PI*2);
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.globalAlpha=.35;ctx.stroke();
    ctx.restore();
    // glow fill
    ctx.save();
    ctx.shadowColor=color;ctx.shadowBlur=22;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color;ctx.fill();
    ctx.restore();
  } else {
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=color+'bb';ctx.fill();
  }
  // border
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle=hl?'#fff':'rgba(255,255,255,.75)';
  ctx.lineWidth=hl?2.5:1.5;ctx.stroke();

  // phantom silhouette above when highlighted
  if(hl) drawMiniPh(ctx,x,y-r-16,color,20,isWhite);

  // number text
  ctx.fillStyle=isWhite?'#222':'#fff';
  ctx.font='bold '+(hl?12:9)+'px Cinzel,serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(num,x,y);
}

function drawMiniPh(ctx,cx,cy,color,size,isWhite){
  const s=size/44;
  ctx.save();ctx.translate(cx-22*s,cy-28*s);ctx.scale(s,s);
  ctx.beginPath();ctx.ellipse(22,18,14,3,0,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
  ctx.beginPath();ctx.roundRect(13,3,18,16,2);ctx.fill();
  ctx.beginPath();ctx.ellipse(25,25,6.5,7.5,0,0,Math.PI*2);ctx.fillStyle='#120d06';ctx.fill();
  ctx.beginPath();
  ctx.moveTo(9,35);ctx.quadraticCurveTo(13,31,22,33);ctx.quadraticCurveTo(31,31,35,35);
  ctx.lineTo(37,55);ctx.quadraticCurveTo(22,57,7,55);ctx.closePath();
  ctx.fillStyle=color;ctx.fill();
  ctx.restore();
}

// ═══ EDIT MODE ═══
let editMode = false;
let editSelectedField = null;
let editHistory = []; // [{field, oldCoord, newCoord}]
// Load any saved edits from localStorage
const savedCoords = localStorage.getItem('fantom_coords_edits');
if (savedCoords) {
  try {
    const parsed = JSON.parse(savedCoords);
    Object.assign(COORDS, parsed);
  } catch(e) {}
}

function toggleEditMode() {
  editMode = !editMode;
  editSelectedField = null;
  const btn = document.getElementById('editToggleBtn');
  const bar = document.getElementById('editBar');
  const picker = document.getElementById('fieldPicker');
  const canvas = document.getElementById('mapCanvas');
  const phRow = document.getElementById('phRow');
  const genRow = document.querySelector('.gen-row');
  const btmRow = document.getElementById('btmRow');
  const resOverlay = document.getElementById('resOverlay');

  if (editMode) {
    btn.textContent = '✓ Hotovo';
    btn.classList.add('active');
    bar.classList.add('visible');
    picker.classList.add('visible');
    canvas.classList.add('edit-active');
    phRow.style.display = 'none';
    genRow.style.display = 'none';
    btmRow.style.display = 'none';
    resOverlay.classList.remove('open');
    buildFieldPicker();
    drawMapEdit();
  } else {
    btn.textContent = '✏️ Upravit';
    btn.classList.remove('active');
    bar.classList.remove('visible');
    picker.classList.remove('visible');
    canvas.classList.remove('edit-active');
    phRow.style.display = '';
    genRow.style.display = '';
    drawMap();
  }
}

function buildFieldPicker() {
  const inner = document.getElementById('fieldPickerInner');
  inner.innerHTML = '';
  for (let n = 1; n <= 202; n++) {
    const chip = document.createElement('div');
    chip.className = 'fp-chip' + (editHistory.some(h=>h.field===n) ? ' moved' : '');
    chip.textContent = n;
    chip.dataset.n = n;
    chip.onclick = () => selectEditField(n);
    inner.appendChild(chip);
  }
}

function selectEditField(n) {
  editSelectedField = n;
  // Update chip styles
  document.querySelectorAll('.fp-chip').forEach(c => {
    const isThis = parseInt(c.dataset.n) === n;
    c.classList.toggle('selected', isThis);
    if (isThis) c.scrollIntoView({block:'nearest'});
  });
  document.getElementById('editSelDisplay').textContent =
    'Políčko ' + n + ' vybráno — klepni na mapu';
  drawMapEdit();
}

function drawMapEdit() {
  const canvas = document.getElementById('mapCanvas');
  const wrap = document.getElementById('mapWrap');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const rect = getRect(mapImg, wrap);

  for (let n = 1; n <= 202; n++) {
    const c = COORDS[n];
    if (!c) continue;
    const px = rect.x + (c[0]/100)*rect.w;
    const py = rect.y + (c[1]/100)*rect.h;
    const isSel = n === editSelectedField;
    const isMoved = editHistory.some(h=>h.field===n);

    // circle
    ctx.beginPath(); ctx.arc(px, py, isSel?16:10, 0, Math.PI*2);
    if (isSel) {
      ctx.fillStyle = 'rgba(232,201,106,0.85)';
      ctx.shadowColor = '#e8c96a'; ctx.shadowBlur = 14;
    } else if (isMoved) {
      ctx.fillStyle = 'rgba(46,204,113,0.7)';
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    } else {
      ctx.fillStyle = 'rgba(12,9,5,0.75)';
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    }
    ctx.fill();
    ctx.strokeStyle = isSel ? '#e8c96a' : isMoved ? '#2ecc71' : 'rgba(255,255,255,0.5)';
    ctx.lineWidth = isSel ? 2.5 : 1.5;
    ctx.shadowBlur = 0;
    ctx.stroke();

    // number
    ctx.fillStyle = isSel ? '#0c0905' : '#fff';
    ctx.font = 'bold ' + (isSel?11:8) + 'px Cinzel,serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(n, px, py);
  }
}

// Map click in edit mode
document.getElementById('mapCanvas').addEventListener('click', function(e) {
  if (!editMode || !editSelectedField) return;
  const wrap = document.getElementById('mapWrap');
  const rect = getRect(mapImg, wrap);
  const bound = wrap.getBoundingClientRect();
  const cx = e.clientX - bound.left;
  const cy = e.clientY - bound.top;
  const px = ((cx - rect.x) / rect.w) * 100;
  const py = ((cy - rect.y) / rect.h) * 100;
  if (px < 0 || px > 100 || py < 0 || py > 100) return;

  const oldCoord = [...COORDS[editSelectedField]];
  COORDS[editSelectedField] = [+px.toFixed(2), +py.toFixed(2)];
  editHistory.push({field: editSelectedField, oldCoord, newCoord: [...COORDS[editSelectedField]]});

  // Mark as moved in picker
  document.querySelectorAll('.fp-chip').forEach(c => {
    if (parseInt(c.dataset.n) === editSelectedField) {
      c.classList.add('moved');
      c.classList.remove('selected');
    }
  });

  document.getElementById('editSelDisplay').textContent =
    '✓ Políčko ' + editSelectedField + ' přesunuto — vyber další';
  editSelectedField = null;
  drawMapEdit();
});

function editUndo() {
  if (!editHistory.length) return;
  const last = editHistory.pop();
  COORDS[last.field] = last.oldCoord;
  // update chip
  document.querySelectorAll('.fp-chip').forEach(c => {
    if (parseInt(c.dataset.n) === last.field) {
      const stillMoved = editHistory.some(h=>h.field===last.field);
      c.classList.toggle('moved', stillMoved);
    }
  });
  document.getElementById('editSelDisplay').textContent =
    'Vráceno políčko ' + last.field;
  drawMapEdit();
}

function saveEdits() {
  // Save edits to localStorage so they persist
  const edits = {};
  editHistory.forEach(h => { edits[h.field] = COORDS[h.field]; });
  const existing = JSON.parse(localStorage.getItem('fantom_coords_edits') || '{}');
  Object.assign(existing, edits);
  localStorage.setItem('fantom_coords_edits', JSON.stringify(existing));
  document.getElementById('editSelDisplay').textContent =
    '✓ Uloženo ' + Object.keys(existing).length + ' oprav';
}

// ═══ INIT ═══
buildSel();
window.addEventListener('resize',()=>{ if(editMode) drawMapEdit(); else drawMap(); });
mapImg.onload=()=>drawMap();
</script>
